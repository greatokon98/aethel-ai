name: Build & Deploy to Netlify (Zero Build Minutes)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Test Netlify token
        run: |
          echo "Testing token..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Token valid."
          elif [ "$HTTP_CODE" = "401" ]; then
            echo "TOKEN INVALID - regenerate in Netlify"
            exit 1
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "FORBIDDEN - token lacks deploy permission or site has restrictions"
            curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" | head -c 500
            exit 1
          else
            echo "Unexpected status: $HTTP_CODE"
            curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" | head -c 500
            exit 1
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify via API
        run: |
          echo "Creating deploy..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"required":[]}' \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys")
          echo "Response:"
          echo "$RESPONSE" | head -c 1000
          if echo "$RESPONSE" | grep -q '"id"'; then
            echo -e "\nDeploy created successfully."
          else
            echo -e "\nDeploy creation failed."
            exit 1
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
